spring.application.name=marmura_order_manager
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/marble_orders}
spring.datasource.username=${DATABASE_USERNAME:mario}
spring.datasource.password=${DATABASE_PASSWORD:mario123}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
server.port=8081
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
app.admin.password=${ADMIN_PASSWORD:mario123}
app.demo.password=${DEMO_PASSWORD:demo123}
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework=WARN
logging.level.org.example.marmura_order_manager=INFO
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.jpa.open-in-view=false
spring.flyway.enabled=false