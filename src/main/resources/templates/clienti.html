<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Marble Order Manager</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">🪨 Marble Manager</span>
    <div>
        <a href="/api/clienti/pagina" class="btn btn-outline-light btn-sm me-2">Clienți</a>
        <a href="/api/comenzi/pagina" class="btn btn-outline-light btn-sm me-2">Comenzi</a>
        <a href="/api/materiale/pagina" class="btn btn-outline-light btn-sm">Materiale</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Clienți</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Nume</th>
            <th>Telefon</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="client : ${clienti}">
            <td th:text="${client.name}"></td>
            <td th:text="${client.telefon}"></td>
        </tr>
        </tbody>
    </table>
    <h4 class="mt-4">Adaugă Client Nou</h4>
    <form action="/api/clienti/adauga" method="post">
        <div class="mb-3">
            <label>Nume</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Telefon</label>
            <input type="text" name="telefon" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Adauga</button>
    </form>
</div>
</body>
</html>
