<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <div th:replace="~{fragments/layout :: scripts}"></div>
    <title>Materiale</title>
</head>
<body class="bg-gray-50 min-h-screen">

<div th:replace="~{fragments/layout :: header}"></div>

<div class="max-w-7xl mx-auto px-6 py-8" x-data="{ modalOpen: false }">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-900">Materiale</h1>
        <button @click="modalOpen = true; openAdd()"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-lg">
            + Adaugă Material
        </button>
    </div>

    <div class="bg-white rounded-lg shadow mb-4 p-4">
        <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="text"
                   id="searchInput"
                   oninput="cautaMateriale()"
                   placeholder="Caută după nume, tip, grosime sau origine..."
                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Nume</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Tip</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Origine</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Grosime (cm)</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Preț (RON/m²)</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Acțiuni</th>
            </tr>
            </thead>
            <tbody id="tabelMateriale" class="divide-y divide-gray-200">
            <tr th:each="material : ${materiale}" class="hover:bg-gray-50">
                <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${material.name}"></td>
                <td class="px-6 py-4 text-sm">
                    <span th:switch="${material.tipMaterial != null ? material.tipMaterial.name() : ''}">
                        <span th:case="'Marmura'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-amber-100 text-amber-800">Marmură</span>
                        <span th:case="'Granit'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-stone-200 text-stone-800">Granit</span>
                        <span th:case="'Quartz'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-cyan-100 text-cyan-800">Quartz</span>
                        <span th:case="*" class="text-gray-400">—</span>
                    </span>
                </td>
                <td class="px-6 py-4 text-sm text-gray-700" th:text="${material.origine != null ? material.origine : '—'}"></td>
                <td class="px-6 py-4 text-sm text-gray-700" th:text="${material.grosime}"></td>
                <td class="px-6 py-4 text-sm text-gray-700" th:text="${material.pret}"></td>
                <td class="px-6 py-4 text-sm">
                    <button th:data-id="${material.id}"
                            th:data-name="${material.name}"
                            th:data-tip="${material.tipMaterial != null ? material.tipMaterial.name() : ''}"
                            th:data-grosime="${material.grosime}"
                            th:data-pret="${material.pret}"
                            th:data-origine="${material.origine}"
                            @click="modalOpen = true; openEdit($el)"
                            class="text-blue-600 hover:text-blue-800 mr-3">
                        <i data-lucide="pencil" class="w-4 h-4"></i>
                    </button>
                    <button th:onclick="'deleteMaterial(' + ${material.id} + ')'"
                            class="text-red-600 hover:text-red-800 mr-3">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div x-show="modalOpen"
         x-cloak
         id="modal"
         class="fixed inset-0 z-50 flex items-center justify-center p-4">

        <div class="fixed inset-0 bg-black bg-opacity-50" @click="modalOpen = false"></div>
        <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full p-6">
            <h2 id="modalTitle" class="text-xl font-bold text-gray-900 mb-4">Adaugă Material</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nume</label>
                    <input type="text" id="inputNume"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tip</label>
                    <select id="inputTip"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="Marmura">Marmură</option>
                        <option value="Granit">Granit</option>
                        <option value="Quartz">Quartz</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Origine</label>
                    <input type="text" id="inputOrigine" placeholder="ex. Italia"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Grosime (cm)</label>
                    <input type="number" id="inputGrosime" min="0"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Preț (RON/m²)</label>
                    <input type="number" id="inputPret" min="0" step="0.01"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button @click="modalOpen = false"
                        class="px-4 py-2 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50">
                    Anulează
                </button>
                <button id="btnSalveaza" onclick="salveazaMaterial()"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-lg">
                    Creează
                </button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: init-icons}"></div>

<script>
    let editingId = null;

    function openAdd() {
        editingId = null;
        document.getElementById('modalTitle').textContent = 'Adaugă Material';
        document.getElementById('btnSalveaza').textContent = 'Creează';
        document.getElementById('inputNume').value = '';
        document.getElementById('inputTip').value = 'Marmura';
        document.getElementById('inputOrigine').value = '';
        document.getElementById('inputGrosime').value = '';
        document.getElementById('inputPret').value = '';
    }

    function openEdit(btn) {
        editingId = btn.dataset.id;
        document.getElementById('modalTitle').textContent = 'Modifică Material';
        document.getElementById('btnSalveaza').textContent = 'Salvează';
        document.getElementById('inputNume').value = btn.dataset.name || '';
        document.getElementById('inputTip').value = btn.dataset.tip || 'Marmura';
        document.getElementById('inputOrigine').value = btn.dataset.origine || '';
        document.getElementById('inputGrosime').value = btn.dataset.grosime || '';
        document.getElementById('inputPret').value = btn.dataset.pret || '';
    }

    async function salveazaMaterial() {
        const name = document.getElementById('inputNume').value.trim();
        const tipMaterial = document.getElementById('inputTip').value;
        const origine = document.getElementById('inputOrigine').value.trim();
        const grosime = parseInt(document.getElementById('inputGrosime').value, 10);
        const pret = parseFloat(document.getElementById('inputPret').value);

        if (!name || !tipMaterial || isNaN(grosime) || isNaN(pret)) {
            alert("Completeaza toate campurile!");
            return;
        }

        const url = editingId ? `/api/materiale/${editingId}` : '/api/materiale';
        const method = editingId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, tipMaterial, origine, grosime, pret })
            });
            if (!response.ok) {
                alert('Eroare la salvare');
                return;
            }
            location.reload();
        } catch (error) {
            alert('Eroare ' + error.message);
        }
    }

    async function deleteMaterial(id) {
        const confirmare = confirm("Esti sigur ca vrei sa stergi materialul?");
        if (!confirmare) { return; }

        try {
            const response = await fetch('/api/materiale/' + id, {
                method: 'DELETE'
            });
            if (!response.ok) {
                alert('Eroare la stergere');
                return;
            }
            location.reload();
        } catch (error) {
            alert('Eroare ' + error.message);
        }
    }

    function cautaMateriale() {
        const textCautat = document.getElementById('searchInput').value.toLowerCase();
        const randuri = document.querySelectorAll('#tabelMateriale tr');

        randuri.forEach(rand => {
            const nume = rand.cells[0].textContent.toLowerCase();
            const tip = rand.cells[1].textContent.toLowerCase();
            const origine = rand.cells[2].textContent.toLowerCase();
            const grosime = rand.cells[3].textContent.toLowerCase();

            if (nume.includes(textCautat) || tip.includes(textCautat)
                || origine.includes(textCautat) || grosime.includes(textCautat)) {
                rand.style.display = '';
            } else {
                rand.style.display = 'none';
            }
        });
    }
</script>

</body>
</html>
