<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Marble Order Manager</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Marble Manager</span>
    <div>
        <a href="/api/clienti/pagina" class="btn btn-outline-light btn-sm me-2">Clienti</a>
        <a href="/api/comenzi/pagina" class="btn btn-outline-light btn-sm me-2">Comenzi</a>
        <a href="/api/materiale/pagina" class="btn btn-outline-light btn-sm">Materiale</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- LISTA COMENZI -->
    <h2>Comenzi</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Client</th>
            <th>Telefon</th>
            <th>Data</th>
            <th>Status</th>
            <th>Actiuni</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="comanda : ${comenzi}">
            <td th:text="${comanda.client.name}"></td>
            <td th:text="${comanda.client.telefon}"></td>
            <td th:text="${comanda.dataComenzii}"></td>
            <td>
                <span th:text="${comanda.status}"
                      th:classappend="${comanda.status == 'Noua'} ? 'badge bg-primary' :
                                      (${comanda.status == 'InLucru'} ? 'badge bg-warning' :
                                      (${comanda.status == 'Gata'} ? 'badge bg-success' : 'badge bg-secondary'))">
                </span>
            </td>
            <td>
                <a th:href="@{/api/comenzi/{id}/detalii(id=${comanda.id})}"
                   class="btn btn-sm btn-info">Detalii</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- COMANDA NOUA -->
    <hr>
    <h4>Comanda Noua</h4>

    <!-- CAUTARE CLIENT -->
    <div class="mb-3">
        <label>Cauta client dupa nume sau telefon</label>
        <div class="input-group">
            <input type="text" id="searchInput" class="form-control" placeholder="Nume sau telefon...">
            <button class="btn btn-outline-secondary" onclick="cautaClient()">Cauta</button>
        </div>
        <div id="rezultateCautare" class="mt-2"></div>
    </div>

    <!-- DATE CLIENT -->
    <div class="card p-3 mb-3">
        <h6>Client</h6>
        <input type="hidden" id="clientId">
        <div class="row">
            <div class="col">
                <label>Nume</label>
                <input type="text" id="clientNume" class="form-control" placeholder="Nume client">
            </div>
            <div class="col">
                <label>Telefon</label>
                <input type="text" id="clientTelefon" class="form-control" placeholder="Telefon">
            </div>
        </div>
    </div>

    <!-- OBSERVATII -->
    <div class="mb-3">
        <label>Observatii</label>
        <textarea id="observatii" class="form-control" rows="2"></textarea>
    </div>

    <!-- LINII COMANDA -->
    <h5>Linii Comanda</h5>
    <div id="linii"></div>
    <button class="btn btn-outline-primary mb-3" onclick="adaugaLinie()">+ Adauga linie</button>

    <br>
    <button class="btn btn-success" onclick="salveazaComanda()">Salveaza Comanda</button>
</div>

<script>
    let materiale = [];

    fetch('/api/materiale')
        .then(r => r.json())
        .then(data => {
            materiale = data;
            console.log('Materiale:', materiale);
        });


    console.log('Materiale primite:', materiale);
    console.log('Lungime:', materiale.length);
    function cautaClient() {
        const query = document.getElementById('searchInput').value;
        fetch('/api/clienti/cauta?query=' + query)
            .then(r => r.json())
            .then(clienti => {
                const div = document.getElementById('rezultateCautare');
                if (clienti.length === 0) {
                    div.innerHTML = '<small class="text-muted">Niciun client gasit. Completeaza datele pentru client nou.</small>';
                    document.getElementById('clientId').value = '';
                } else {
                    div.innerHTML = clienti.map(c =>
                        `<button class="btn btn-sm btn-outline-success me-2 mt-1"
                            onclick="selecteazaClient(${c.id}, '${c.name}', '${c.telefon}')">
                            ${c.name} - ${c.telefon}
                        </button>`
                    ).join('');
                }
            });
    }

    function selecteazaClient(id, nume, telefon) {
        document.getElementById('clientId').value = id;
        document.getElementById('clientNume').value = nume;
        document.getElementById('clientTelefon').value = telefon;
        document.getElementById('rezultateCautare').innerHTML =
            '<small class="text-success">Client selectat: ' + nume + '</small>';
    }

    let linieIndex = 0;

    function adaugaLinie() {
        const optiuniMateriale = materiale.map(m =>
            `<option value="${m.name}|${m.grosime}">${m.name} - ${m.grosime}cm - ${m.pret} RON/mp</option>`
        ).join('');

        const div = document.createElement('div');
        div.className = 'card p-3 mb-2';
        div.id = 'linie_' + linieIndex;
        div.innerHTML = `
            <div class="row mb-2">
                <div class="col">
                    <label>Material</label>
                    <select class="form-control material-select" onchange="updateGrosime(this, ${linieIndex})">
                        ${optiuniMateriale}
                    </select>
                </div>
                <div class="col-1">
                    <label>Grosime</label>
                    <input type="number" class="form-control grosime" readonly>
                </div>
                <div class="col">
                    <label>Lungime (cm)</label>
                    <input type="number" class="form-control lungime" step="0.1">
                </div>
                <div class="col">
                    <label>Latime (cm)</label>
                    <input type="number" class="form-control latime" step="0.1">
                </div>
                <div class="col">
                    <label>Tip Cant</label>
                    <select class="form-control tip-cant">
                        <option value="FARA_CANT">Fara cant</option>
                        <option value="CU_MASINA">Cu masina</option>
                        <option value="LA_ROTUND">La rotund</option>
                    </select>
                </div>
                <div class="col-1 d-flex align-items-end">
                    <button class="btn btn-sm btn-danger" onclick="stergeLinie(${linieIndex})">X</button>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label>Laturi cant:</label><br>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input cant-stanga" type="checkbox">
                        <label class="form-check-label">Stanga</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input cant-dreapta" type="checkbox">
                        <label class="form-check-label">Dreapta</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input cant-sus" type="checkbox">
                        <label class="form-check-label">Sus</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input cant-jos" type="checkbox">
                        <label class="form-check-label">Jos</label>
                    </div>
                </div>
                <div class="col">
                    <label>Colturi:</label><br>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input colt-sus-stanga" type="checkbox">
                        <label class="form-check-label">Sus-Stanga</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input colt-sus-dreapta" type="checkbox">
                        <label class="form-check-label">Sus-Dreapta</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input colt-jos-stanga" type="checkbox">
                        <label class="form-check-label">Jos-Stanga</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input colt-jos-dreapta" type="checkbox">
                        <label class="form-check-label">Jos-Dreapta</label>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('linii').appendChild(div);

        // seteaza grosimea initiala
        const select = div.querySelector('.material-select');
        const grosimeInput = div.querySelector('.grosime');
        const parts = select.value.split('|');
        grosimeInput.value = parts[1];

        linieIndex++;
    }

    function updateGrosime(select, index) {
        const parts = select.value.split('|');
        const card = document.getElementById('linie_' + index);
        card.querySelector('.grosime').value = parts[1];
    }

    function stergeLinie(index) {
        document.getElementById('linie_' + index).remove();
    }

    function salveazaComanda() {
        const clientId = document.getElementById('clientId').value;
        const clientNume = document.getElementById('clientNume').value;
        const clientTelefon = document.getElementById('clientTelefon').value;
        const observatii = document.getElementById('observatii').value;

        const liniiCards = document.querySelectorAll('#linii .card');
        const linii = [];

        liniiCards.forEach(card => {
            const matVal = card.querySelector('.material-select').value.split('|');
            linii.push({
                material: matVal[0],
                grosime: parseInt(matVal[1]),
                lungime: parseFloat(card.querySelector('.lungime').value),
                latime: parseFloat(card.querySelector('.latime').value),
                cant: card.querySelector('.tip-cant').value,
                cantStanga: card.querySelector('.cant-stanga').checked,
                cantDreapta: card.querySelector('.cant-dreapta').checked,
                cantSus: card.querySelector('.cant-sus').checked,
                cantJos: card.querySelector('.cant-jos').checked,
                coltSusStanga: card.querySelector('.colt-sus-stanga').checked,
                coltSusDreapta: card.querySelector('.colt-sus-dreapta').checked,
                coltJosStanga: card.querySelector('.colt-jos-stanga').checked,
                coltJosDreapta: card.querySelector('.colt-jos-dreapta').checked
            });
        });

        const body = {
            observatii: observatii,
            linii: linii
        };

        if (clientId) {
            body.client_id = parseInt(clientId);
        } else {
            // client nou - il cream mai intai
            fetch('/api/clienti', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: clientNume, telefon: clientTelefon})
            })
                .then(r => r.json())
                .then(client => {
                    body.client_id = client.id;
                    trimiteComanda(body);
                });
            return;
        }

        trimiteComanda(body);
    }

    function trimiteComanda(body) {
        fetch('/api/comenzi', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        })
            .then(r => r.json())
            .then(() => {
                alert('Comanda salvata!');
                location.reload();
            });
    }
</script>
</body>
</html>
