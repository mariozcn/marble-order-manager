<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <div th:replace="~{fragments/layout :: scripts}"></div>
    <title>Detalii Comandă</title>
</head>
<body class="bg-gray-50 min-h-screen">

<div th:replace="~{fragments/layout :: header}"></div>

<div class="max-w-7xl mx-auto px-6 py-8" x-data="{ modalOpen: false }">

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center space-x-3">
            <a th:href="@{/api/clienti/{id}/comenzi-pagina(id=${comanda.client.id})}"
               class="text-gray-500 hover:text-gray-900">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <h1 class="text-3xl font-bold text-gray-900">
                Comandă #<span th:text="${comanda.id}"></span>
            </h1>
            <span th:switch="${comanda.status.name()}">
                <span th:case="'Noua'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-blue-100 text-blue-800">Nouă</span>
                <span th:case="'InLucru'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-yellow-100 text-yellow-800">În Lucru</span>
                <span th:case="'Gata'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-green-100 text-green-800">Gata</span>
                <span th:case="'Ridicata'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-800">Ridicată</span>
            </span>
        </div>
        <button @click="modalOpen = true"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-lg inline-flex items-center space-x-2">
            <i data-lucide="pencil" class="w-4 h-4"></i>
            <span>Modifică status</span>
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center space-x-2 text-gray-500 mb-3">
                <i data-lucide="user" class="w-4 h-4"></i>
                <span class="text-xs font-medium uppercase tracking-wider">Client</span>
            </div>
            <div class="text-lg font-semibold text-gray-900" th:text="${comanda.client.name}"></div>
            <div class="text-sm text-gray-600 mt-1" th:text="${comanda.client.telefon}"></div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center space-x-2 text-gray-500 mb-3">
                <i data-lucide="calendar" class="w-4 h-4"></i>
                <span class="text-xs font-medium uppercase tracking-wider">Data comenzii</span>
            </div>
            <div class="text-lg font-semibold text-gray-900" th:text="${comanda.dataComenzii}"></div>
            <div class="text-sm text-gray-600 mt-1">
                <span th:text="${comanda.linii.size()}"></span> itemi
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center space-x-2 text-gray-500 mb-3">
                <i data-lucide="receipt" class="w-4 h-4"></i>
                <span class="text-xs font-medium uppercase tracking-wider">Total</span>
            </div>
            <div class="text-2xl font-bold text-gray-900">
                <span th:text="${#aggregates.sum(comanda.linii.![pret])}"></span>
                <span class="text-base font-medium text-gray-500">RON</span>
            </div>
        </div>
    </div>

    <div th:if="${!#strings.isEmpty(comanda.observatii)}"
         class="bg-white rounded-lg shadow p-6 mb-6">
        <div class="flex items-center space-x-2 text-gray-500 mb-2">
            <i data-lucide="sticky-note" class="w-4 h-4"></i>
            <span class="text-xs font-medium uppercase tracking-wider">Observații</span>
        </div>
        <p class="text-sm text-gray-700 whitespace-pre-line" th:text="${comanda.observatii}"></p>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900">Linii comandă</h2>
        </div>
        <table class="w-full">
            <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">#</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Material</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Dimensiuni (cm)</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Tip cant</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Cant</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Colțuri</th>
                <th class="text-right px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Preț</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <tr th:each="linie, iterStat : ${comanda.linii}" class="hover:bg-gray-50">
                <td class="px-6 py-4 text-sm text-gray-500" th:text="${iterStat.count}"></td>
                <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${linie.material}"></td>
                <td class="px-6 py-4 text-sm text-gray-700">
                    <span th:text="${linie.lungime}"></span> ×
                    <span th:text="${linie.latime}"></span> ×
                    <span th:text="${linie.grosime}"></span>
                </td>
                <td class="px-6 py-4 text-sm text-gray-700">
                    <span th:switch="${linie.cant != null ? linie.cant.name() : ''}">
                        <span th:case="'CU_MASINA'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-indigo-100 text-indigo-800">Cu mașina</span>
                        <span th:case="'LA_ROTUND'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-purple-100 text-purple-800">La rotund</span>
                        <span th:case="*" class="text-gray-400">—</span>
                    </span>
                </td>
                <td class="px-6 py-4 text-sm text-gray-700">
                    <div class="flex flex-wrap gap-1">
                        <span th:if="${linie.cantSus}" class="inline-flex px-2 py-0.5 text-xs font-medium rounded bg-gray-100 text-gray-700">Sus</span>
                        <span th:if="${linie.cantJos}" class="inline-flex px-2 py-0.5 text-xs font-medium rounded bg-gray-100 text-gray-700">Jos</span>
                        <span th:if="${linie.cantStanga}" class="inline-flex px-2 py-0.5 text-xs font-medium rounded bg-gray-100 text-gray-700">Stânga</span>
                        <span th:if="${linie.cantDreapta}" class="inline-flex px-2 py-0.5 text-xs font-medium rounded bg-gray-100 text-gray-700">Dreapta</span>
                        <span th:if="${!linie.cantSus and !linie.cantJos and !linie.cantStanga and !linie.cantDreapta}"
                              class="text-gray-400">—</span>
                    </div>
                </td>
                <td class="px-6 py-4 text-sm text-gray-700">
                    <div class="flex flex-wrap gap-1">
                        <span th:if="${linie.coltSusStanga}" class="inline-flex px-2 py-0.5 text-xs font-medium rounded bg-gray-100 text-gray-700">SS</span>
                        <span th:if="${linie.coltSusDreapta}" class="inline-flex px-2 py-0.5 text-xs font-medium rounded bg-gray-100 text-gray-700">SD</span>
                        <span th:if="${linie.coltJosStanga}" class="inline-flex px-2 py-0.5 text-xs font-medium rounded bg-gray-100 text-gray-700">JS</span>
                        <span th:if="${linie.coltJosDreapta}" class="inline-flex px-2 py-0.5 text-xs font-medium rounded bg-gray-100 text-gray-700">JD</span>
                        <span th:if="${!linie.coltSusStanga and !linie.coltSusDreapta and !linie.coltJosStanga and !linie.coltJosDreapta}"
                              class="text-gray-400">—</span>
                    </div>
                </td>
                <td class="px-6 py-4 text-sm font-medium text-gray-900 text-right">
                    <span th:text="${linie.pret}"></span> RON
                </td>
            </tr>
            </tbody>
            <tfoot class="bg-gray-50 border-t border-gray-200">
            <tr>
                <td colspan="6" class="px-6 py-3 text-sm font-medium text-gray-700 text-right">Total</td>
                <td class="px-6 py-3 text-sm font-bold text-gray-900 text-right">
                    <span th:text="${#aggregates.sum(comanda.linii.![pret])}"></span> RON
                </td>
            </tr>
            </tfoot>
        </table>
    </div>

    <div x-show="modalOpen"
         x-cloak
         id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="fixed inset-0 bg-black bg-opacity-50" @click="modalOpen = false"></div>

        <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full p-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4">Modifică status</h2>

            <div class="grid grid-cols-2 gap-3">
                <button th:onclick="'updateStatus(' + ${comanda.id} + ', \'Noua\')'"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-100 text-blue-800 hover:bg-blue-200">
                    Nouă
                </button>
                <button th:onclick="'updateStatus(' + ${comanda.id} + ', \'InLucru\')'"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-yellow-100 text-yellow-800 hover:bg-yellow-200">
                    În Lucru
                </button>
                <button th:onclick="'updateStatus(' + ${comanda.id} + ', \'Gata\')'"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-green-100 text-green-800 hover:bg-green-200">
                    Gata
                </button>
                <button th:onclick="'updateStatus(' + ${comanda.id} + ', \'Ridicata\')'"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-800 hover:bg-gray-200">
                    Ridicată
                </button>
            </div>

            <div class="flex justify-end mt-6">
                <button @click="modalOpen = false"
                        class="px-4 py-2 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50">
                    Anulează
                </button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: init-icons}"></div>

<script>
    async function updateStatus(id, status) {
        try {
            const response = await fetch(`/api/clienti/${id}/status/${status}`, {
                method: 'PATCH'
            });
            if (!response.ok) {
                alert('Eroare la actualizare');
                return;
            }
            location.reload();
        } catch (error) {
            alert('Eroare: ' + error.message);
        }
    }
</script>

</body>
</html>
