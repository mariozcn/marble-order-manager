<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">

<body>

<th:block th:fragment="scripts">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</th:block>

<nav th:fragment="header" class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex items-center justify-between h-16">

            <div class="flex items-center space-x-2">
                <i data-lucide="stone" class="w-6 h-6 text-blue-600"></i>
                <span class="text-lg font-bold text-gray-900">Marmură și granit</span>
            </div>

            <div class="flex items-center space-x-8">
                <a href="/dashboard" class="text-sm font-medium text-gray-600 hover:text-gray-900">Dashboard</a>
                <a href="/api/clienti/pagina" class="text-sm font-medium text-gray-600 hover:text-gray-900">Clienți</a>
                <a href="/api/materiale/pagina" class="text-sm font-medium text-gray-600 hover:text-gray-900">Materiale</a>
                <a href="/api/comenzi/pagina" class="text-sm font-medium text-gray-600 hover:text-gray-900">Comenzi</a>
            </div>

            <a href="/api/comenzi/comanda-noua" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg">
                + Comandă Nouă
            </a>

        </div>
    </div>
</nav>

<th:block th:fragment="init-icons">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
        });
    </script>
</th:block>
</body>
</html>
