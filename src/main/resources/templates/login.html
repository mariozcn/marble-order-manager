<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-lg shadow-md w-full max-w-sm p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Marmură si granit</h1>

    <div th:if="${param.error}" class="bg-red-100 text-red-800 text-sm px-4 py-2 rounded-lg mb-4">
        Username sau parolă incorecte.
    </div>

    <div th:if="${param.logout}" class="bg-green-100 text-green-800 text-sm px-4 py-2 rounded-lg mb-4">
        Te-ai delogat cu succes.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Parolă</label>
            <input type="password" name="password"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg">
            Intră
        </button>
    </form>
</div>

</body>
</html>
