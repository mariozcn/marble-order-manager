<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Marble Order Manager</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">🪨 Marble Manager</span>
    <div>
        <a href="/api/clienti/pagina" class="btn btn-outline-light btn-sm me-2">Clienți</a>
        <a href="/api/comenzi/pagina" class="btn btn-outline-light btn-sm me-2">Comenzi</a>
        <a href="/api/materiale/pagina" class="btn btn-outline-light btn-sm">Materiale</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Materiale</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Tip</th>
            <th>Nume</th>
            <th>Grosime</th>
            <th>Pret</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="material : ${materiale}">
            <td th:text="${material.tipMaterial}"></td>
            <td th:text="${material.name}"></td>
            <td th:text="${material.grosime}"></td>
            <td th:text="${material.pret}"></td>
        </tr>
        </tbody>
    </table>
    <h4 class="mt-4">Adaugă Material Nou</h4>
    <form action="/api/materiale/adauga" method="post">
        <div class="mb-3">
            <label>Tip</label>
            <select name="tipMaterial" class="form-control">
                <option value="Granit">Granit</option>
                <option value="Marmura">Marmura</option>
                <option value="Quartz">Quartz</option>
            </select>
        </div>
        <div class="mb-3">
            <label>Nume</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Grosime</label>
            <input type="numer" name="grosime" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Pret</label>
            <input type="number" name="pret" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Adauga</button>
    </form>
</div>
</body>
</html>
