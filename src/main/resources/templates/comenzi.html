<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <div th:replace="~{fragments/layout :: scripts}"></div>
    <title>Comenzi</title>
</head>
<body class="bg-gray-50 min-h-screen">

<div th:replace="~{fragments/layout :: header}"></div>

<div class="max-w-7xl mx-auto px-6 py-8" x-data="{ modalOpen: false, comandaId: null }">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-900">Comenzi</h1>
    </div>

    <div class="bg-white rounded-lg shadow mb-4 p-4">
        <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="text"
                   id="searchInput"
                   oninput="cautaComenzi()"
                   placeholder="Caută după client, dată sau status..."
                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Data</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Client</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Itemi</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Acțiuni</th>
            </tr>
            </thead>
            <tbody id="tabelComenzi" class="divide-y divide-gray-200">
            <tr th:each="comanda : ${comenzi}" class="hover:bg-gray-50">
                <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${comanda.dataComenzii}"></td>
                <td class="px-6 py-4 text-sm text-gray-900" th:text="${comanda.client != null ? comanda.client.name : '—'}"></td>
                <td class="px-6 py-4 text-sm text-gray-900">
                    <span th:switch="${comanda.status.name()}">
                        <span th:case="'Noua'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-blue-100 text-blue-800">Nouă</span>
                        <span th:case="'InLucru'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-yellow-100 text-yellow-800">În Lucru</span>
                        <span th:case="'Gata'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-green-100 text-green-800">Gata</span>
                        <span th:case="'Ridicata'" class="inline-flex px-2 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-800">Ridicată</span>
                    </span>
                </td>
                <td class="px-6 py-4 text-sm text-gray-900" th:text="${comanda.linii.size()}"></td>
                <td class="px-6 py-4 text-sm text-gray-900">
                    <span th:text="${#aggregates.sum(comanda.linii.![pret])}"></span> RON
                </td>
                <td class="px-6 py-4 text-sm">
                    <button th:data-id="${comanda.id}"
                            @click="modalOpen = true; comandaId = $el.dataset.id"
                            class="text-blue-600 hover:text-blue-800 mr-3">
                        <i data-lucide="pencil" class="w-4 h-4"></i>
                    </button>
                    <button th:onclick="'deleteComanda(' + ${comanda.id} + ')'"
                            class="text-red-600 hover:text-red-800 mr-3">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <a th:href="@{/api/comenzi/{id}/detalii(id=${comanda.id})}"
                       class="text-gray-600 hover:text-gray-900 mr-3 inline-block">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div x-show="modalOpen"
         x-cloak
         id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="fixed inset-0 bg-black bg-opacity-50" @click="modalOpen = false"></div>

        <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full p-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4">Modifică status</h2>

            <div class="grid grid-cols-2 gap-3">
                <button @click="updateStatus(comandaId, 'Noua'); modalOpen = false"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-100 text-blue-800 hover:bg-blue-200">
                    Nouă
                </button>
                <button @click="updateStatus(comandaId, 'InLucru'); modalOpen = false"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-yellow-100 text-yellow-800 hover:bg-yellow-200">
                    În Lucru
                </button>
                <button @click="updateStatus(comandaId, 'Gata'); modalOpen = false"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-green-100 text-green-800 hover:bg-green-200">
                    Gata
                </button>
                <button @click="updateStatus(comandaId, 'Ridicata'); modalOpen = false"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-800 hover:bg-gray-200">
                    Ridicată
                </button>
            </div>

            <div class="flex justify-end mt-6">
                <button @click="modalOpen = false"
                        class="px-4 py-2 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50">
                    Anulează
                </button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: init-icons}"></div>

<script>
    async function deleteComanda(id) {
        const confirmare = confirm("Esti sigur ca vrei sa stergi comanda?");
        if (!confirmare) { return; }

        try {
            const response = await fetch('/api/comenzi/' + id, {
                method: 'DELETE'
            });
            if (!response.ok) {
                alert('Eroare la stergere');
                return;
            }
            location.reload();
        } catch (error) {
            alert('Eroare ' + error.message);
        }
    }

    async function updateStatus(id, status) {
        if (!id) {
            alert('Eroare: comanda nu a fost selectată');
            return;
        }
        try {
            const response = await fetch(`/api/clienti/${id}/status/${status}`, {
                method: 'PATCH'
            });
            if (!response.ok) {
                alert('Eroare la actualizare');
                return;
            }
            location.reload();
        } catch (error) {
            alert('Eroare: ' + error.message);
        }
    }

    function cautaComenzi() {
        const textCautat = document.getElementById('searchInput').value.toLowerCase();
        const randuri = document.querySelectorAll('#tabelComenzi tr');

        randuri.forEach(rand => {
            const data = rand.cells[0].textContent.toLowerCase();
            const client = rand.cells[1].textContent.toLowerCase();
            const status = rand.cells[2].textContent.toLowerCase();

            if (data.includes(textCautat) || client.includes(textCautat) || status.includes(textCautat)) {
                rand.style.display = '';
            } else {
                rand.style.display = 'none';
            }
        });
    }
</script>

</body>
</html>
